<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokens</title>
    <link href="./bootstrap-5.3.0.min.css" rel="stylesheet">
    <script src="./jquery-3.7.1.min.js"></script>
    <style>
        @media (max-width: 768px) {
            .table thead {
                display: none;
            }

            .table, .table tbody, .table tr, .table td {
                display: block;
                width: 100%;
            }

                .table tr {
                    margin-bottom: 5px;
                }

                .table td {
                    text-align: right;
                    position: relative;
                }

                    .table td input {
                        width: calc(100% - 55px);
                        margin-left: 55px;
                        box-sizing: border-box;
                        text-align: right;
                    }

                    .table td::before {
                        content: attr(data-label);
                        position: absolute;
                        left: 5px;
                        font-weight: bold;
                        text-align: left;
                        white-space: nowrap;
                    }
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div id="statusMessage" class="alert" style="display: none;"></div>
        <textarea id="contentInput" class="form-control mb-3" rows="4" placeholder="Paste JSON / Netscape / Header Cookie string here..."></textarea>
        <div class="row mb-3">
            <div class="col-2">
                <button id="parseContentBtn" class="btn btn-secondary">Parse</button>
            </div>
            <div class="col-10">
                <input type="file" id="fileUpload" accept=".json,.txt" class="form-control" />
            </div>
        </div>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Domain</th>
                    <th>Name</th>
                    <th>Value</th>
                    <th>Path</th>
                    <th>Secure</th>
                    <th>Expires</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tokenTableBody">
                <!-- Dynamic rows will be inserted here -->
            </tbody>
        </table>
        <button id="addRow" class="btn btn-secondary">Add Row</button>
        <button id="refresh" class="btn btn-secondary">Refresh</button>
        <button id="submit" class="btn btn-primary">Submit</button>
    </div>

    <script>
        (function () {
            // UI
            function showStatusMessage(message, type) {
                $('#statusMessage').removeClass('alert-success alert-danger').addClass('alert-' + type).text(message).show();
            }

            function clearStatusMessage() {
                $('#statusMessage').hide().text('');
            }

            function addRow() {
                clearStatusMessage();

                const oneYearLater = new Date();
                oneYearLater.setFullYear(oneYearLater.getFullYear() + 1); // Default max age is one year from now
                const localExpirationDate = oneYearLater.toLocaleString(); // Local time format

                $('#tokenTableBody').append(`
                    <tr>
                        <td data-label="Domain"><input type="text" class="form-control"></td>
                        <td data-label="Name"><input type="text" class="form-control"></td>
                        <td data-label="Value"><input type="text" class="form-control rowValue"></td>
                        <td data-label="Path"><input type="text" class="form-control" value="/"></td>
                        <td data-label="Secure"><input type="text" class="form-control" value="/"></td>
                        <td data-label="Expires"><input type="text" class="form-control" value="${localExpirationDate}"></td>
                        <td data-label="Actions"><button class="btn btn-danger deleteRow">Delete</button></td>
                    </tr>
                `);
                attachRowEvent();
            }

            function attachRowEvent() {
                $('.deleteRow').off('click').on('click', function () {
                    const tr = $(this).closest('tr');
                    tr.find('td').each(function () { $(this).find('input,span').css('text-decoration', 'line-through'); });
                    // Mark row as deleted by adding a data attribute
                    tr.data('deleted', 'true');
                    tr.find('input,button').attr('disabled', true);
                    hasDeleting = true;
                });
                $('.rowValue').off('focus').on('focus', function () { this.select(); });
            }

            function attachCookies(cookies) {
                const existingRows = $('#tokenTableBody').find('tr');

                const now = new Date();
                cookies.sort(compareCookies);
                cookies.forEach(cookie => {
                    if (!cookie.name || !cookie.domain || !cookie.expirationDate) {
                        // Skip cookies missing name, domain, or expirationDate
                        return;
                    }

                    let found = false;
                    const localExpirationDate = cookie.expirationDate ? new Date(cookie.expirationDate * 1000).toLocaleString() : '';

                    // Iterate through existing rows to check for matching rows
                    existingRows.each(function () {
                        const td = $(this).find('td');
                        const rowDomain = td.eq(0).find('input').val() || td.eq(0).find('span').text();
                        const rowName = td.eq(1).find('input').val() || td.eq(1).find('span').text();

                        if (rowDomain === cookie.domain && rowName === cookie.name) {
                            // Update existing row
                            td.eq(2).find('input').val(cookie.value);
                            td.eq(3).find('input').val(cookie.path);
                            td.eq(4).find('input').val(localExpirationDate);
                            found = true;
                            return false; // Exit each loop
                        }
                    });

                    if (!found) {
                        const expires = new Date(localExpirationDate);
                        const isExpired = expires < now;
                        // Add new row
                        $('#tokenTableBody').append(`
                            <tr>
                                <td data-label="Domain"><input type="text" class="form-control" value="${cookie.domain}"></td>
                                <td data-label="Name"><input type="text" class="form-control" value="${cookie.name}"></td>
                                <td data-label="Value"><input type="text" class="form-control" value="${cookie.value}"></td>
                                <td data-label="Path"><input type="text" class="form-control" value="${cookie.path}"></td>
                                <td data-label="Secure"><input type="text" class="form-control" value="${cookie.secure}"></td>
                                <td data-label="Expires"><input type="text" class="form-control" style="${isExpired ? 'color: darkred' : ''}" value="${localExpirationDate}"></td>
                                <td data-label="Actions"><button class="btn btn-danger deleteRow">Delete</button></td>
                            </tr>
                        `);
                    }
                });

                attachRowEvent();
            }

            // Events
            function refreshData() {
                clearStatusMessage();
                $.get(apiUrl, function (data) {
                    const now = new Date();
                    $('#tokenTableBody').empty();
                    data.forEach(function (token) {
                        const expires = new Date(token.expires);
                        const localExpirationDate = token.expires ? expires.toLocaleString() : '';
                        const isExpired = expires < now;

                        $('#tokenTableBody').append(`
                            <tr>
                                <td data-label="Domain"><span>${token.domain}</span></td>
                                <td data-label="Name"><span>${token.name}</span></td>
                                <td data-label="Value"><input type="text" class="form-control rowValue" value="${token.value}"></td>
                                <td data-label="Path"><span>${token.path}</span></td>
                                <td data-label="Secure"><span>${token.secure}</span></td>
                                <td data-label="Expires"><input type="text" class="form-control" style="${isExpired ? 'color: darkred' : ''}" value="${localExpirationDate}"></td>
                                <td data-label="Actions"><button class="btn btn-danger deleteRow">Delete</button></td>
                            </tr>
                        `);
                    });
                    attachRowEvent();
                }).fail(function (xhr, status, error) {
                    showStatusMessage('Refresh data error: ' + error, 'danger');
                });
            }

            function submitData() {
                clearStatusMessage();
                const data = [];
                const now = new Date();
                $('#tokenTableBody tr').each(function () {
                    if ($(this).data('deleted'))
                        return;
                    const td = $(this).find('td');
                    const domain = td.eq(0).find('input').val() || td.eq(0).find('span').text();
                    const name = td.eq(1).find('input').val() || td.eq(1).find('span').text();
                    const value = td.eq(2).find('input').val();
                    const path = td.eq(3).find('input').val() || td.eq(3).find('span').text();
                    const secure = toBool(td.eq(4).find('input').val() || td.eq(4).find('span').text());
                    const expires = new Date(td.eq(5).find('input').val());

                    if (new Date(expires) > now)
                        data.push({ name: name, value: value, domain: domain, path: path, secure: secure, expires: expires });
                });

                // Sort the data before submitting
                data.sort(compareCookies);

                $.ajax({
                    url: apiUrl,
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    success: function (response) {
                        refreshData();
                        showStatusMessage(`Submit data successfully`, 'success');
                        hasDeleting = false;
                    },
                    error: function (xhr, status, error) {
                        showStatusMessage(`Submit data error: ` + error, 'danger');
                    }
                });
            }

            function handleFileUpload(event) {
                if (hasDeleting) {
                    alert('There is data deletion hanging, please submit and then import.');
                    return;
                }
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        try {
                            const cookies = guessAndParseInput(e.target.result);
                            attachCookies(cookies);
                        } catch (error) {
                            showStatusMessage('Error parsing file: ' + error.message, 'danger');
                        }
                    };
                    reader.readAsText(file);
                } else {
                    showStatusMessage('Please select a valid file.', 'danger');
                }
                event.target.value = '';
            }

            function handleParseInput() {
                if (hasDeleting) {
                    alert('There is data deletion hanging, please submit and then import.');
                    return;
                }
                try {
                    const contentText = $('#contentInput').val();
                    const cookies = guessAndParseInput(contentText);
                    attachCookies(cookies);
                    $('#contentInput').val('');
                } catch (error) {
                    showStatusMessage('Error parsing content: ' + error.message, 'danger');
                }
            }

            // Cookies helper
            function guessAndParseInput(content) {
                // Try to detect format
                const trimmedContent = content.trim();

                // Try JSON format
                if (trimmedContent.startsWith('{') || trimmedContent.startsWith('[')) {
                    const jsonData = JSON.parse(trimmedContent);
                    return jsonData.cookies || jsonData || [];
                }

                // Try Netscape format (contains tabs)
                const nonCommentLines = trimmedContent.split('\n')
                    .filter(line => !line.trim().startsWith('#') && line.trim() !== '');
                if (nonCommentLines.length > 0) {
                    const firstDataLine = nonCommentLines[0];
                    const tabCount = (firstDataLine.match(/\t/g) || []).length;

                    // Netscape format should have exactly 6 tabs (7 fields)
                    if (tabCount >= 6) {
                        return parseNetscapeFormat(trimmedContent);
                    }
                }

                // Try Header format
                if (trimmedContent.includes('=')) {
                    return parseHeaderFormat(trimmedContent);
                }

                showStatusMessage('No valid cookies found in the input', 'danger');
            }

            function parseNetscapeFormat(content) {
                const cookies = [];
                const lines = content.split('\n');

                for (const line of lines) {
                    const trimmedLine = line.trim();
                    if (trimmedLine.startsWith('#') || trimmedLine === '') continue;

                    // Netscape format: domain TRUE/FALSE path secure EXPIRES name value
                    const parts = trimmedLine.split('\t');
                    if (parts.length >= 7) {
                        const oneYearLater = Math.floor(Date.now() / 1000) + 365 * 24 * 60 * 60;
                        const expires = parts[4] && parts[4] !== '0' ? parseInt(parts[4]) : oneYearLater;

                        cookies.push({
                            domain: parts[0],
                            name: parts[5],
                            value: parts[6],
                            path: parts[2],
                            secure: toBool(parts[3]),
                            expirationDate: expires
                        });
                    }
                }
                return cookies;
            }

            function parseHeaderFormat(content) {
                const domain = prompt(
                    'Please enter the domain for these cookies (leave empty to use current domain: ' +
                    window.location.hostname + '):',
                    window.location.hostname
                );
                if (domain === null) return; // User cancelled

                const cookies = [];
                const oneYearLater = Math.floor(Date.now() / 1000) + 365 * 24 * 60 * 60;

                const parts = content.split(';');

                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i].trim();
                    const [name, value] = part.split('=');

                    const cookie = {
                        name: name?.trim() || '',
                        value: value?.trim() || '',
                        domain: domain,
                        path: '/',
                        secure: false,
                        expirationDate: oneYearLater
                    };

                    applyCookiePrefixRules(cookie);
                    cookies.push(cookie);
                }
                return cookies;
            }

            function parseJsonString(jsonStr) {
                const jsonData = JSON.parse(jsonStr);
                const cookies = jsonData.cookies || jsonData || [];
                return cookies;
            }

            function applyCookiePrefixRules(cookie) {
                const name = cookie.name || '';

                if (name.startsWith('__Secure-')) {
                    cookie.secure = true;
                }

                if (name.startsWith('__Host-')) {
                    cookie.secure = true;
                    cookie.path = '/';
                    cookie.domain = '';  // No domain means host-only
                }

                if (name.startsWith('__Http-')) {
                    cookie.secure = true;
                    cookie.httpOnly = true;
                }

                if (name.startsWith('__HostHttp-')) {
                    cookie.secure = true;
                    cookie.httpOnly = true;
                    cookie.path = '/';
                    cookie.domain = '';
                }
            }

            // Helper Functions
            function compareCookies(a, b) {
                const domainA = a.domain.toLowerCase();
                const domainB = b.domain.toLowerCase();
                const nameA = a.name.toLowerCase();
                const nameB = b.name.toLowerCase();

                if (domainA < domainB) return -1;
                if (domainA > domainB) return 1;

                if (nameA < nameB) return -1;
                if (nameA > nameB) return 1;

                return 0;
            }

            function getUrlParent(fullUrl) {
                try {
                    const url = new URL(fullUrl);
                    const baseUrl = url.origin;
                    let path = url.pathname;
                    if (path !== "" && !path.endsWith("/")) {
                        path = path.substring(0, path.lastIndexOf("/") + 1);
                    }
                    return baseUrl + path;
                } catch (e) {
                    return "";
                }
            }

            function toBool(boolStr) {
                return boolStr?.toLowerCase()?.trim() === 'true';
            }

            const apiUrl = getUrlParent(window.location.href) + 'tokens';
            let hasDeleting = false;

            $(document).ready(function () {
                $('#refresh').click(refreshData);
                $('#submit').click(submitData);
                $('#addRow').click(addRow);
                $('#parseContentBtn').click(handleParseInput);
                $('#fileUpload').change(handleFileUpload);
                refreshData();
            });
        })();
    </script>
</body>
</html>
